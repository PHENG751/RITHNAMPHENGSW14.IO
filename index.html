<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USING BOOTSTAP FORM </title>
    <!-- link file stylesheet bootstrap.css -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

    <div class="container">
        <div class="row justify-content-center align-items-center">
            <form id="userForm" class="col-4 shadow-lg p-3 mt-5 bg-body-tertiary rounded">
                <div class="mb-1 ">
                    <h3 class="text-primary" >USER INFORMATION FORM</h3>
                    <label for="fullname" class="form-label">Full Name:</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person-heart"></i>
                        </span>
                        <input type="text" class="form-control" id="fullname" placeholder="Enter your fullname" required>
                    </div>
                    <!-- <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <label for="email" class="form-label mt-3">Email address:</label>
                        <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                    </div>
                     -->

                         
                </div>
                <div class="mb-3">
                    <label for="gender" class="form-label">Gender : </label>
                    <div class="form-check form-check-inline" >
                        <input class="form-check-input" type="radio" name="gender" id="male" value="male" checked>
                        <label class="form-check-label" for="male">Male</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                        <label class="form-check-label" for="female">Female</label>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="salary" class="form-label">Salary :</label>
                    
                     <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-currency-dollar"></i>
                        </span>
                        <input type="number" class="form-control" id="salary" placeholder="Enter your salary" required>
                    </div>

                </div>
                 <div class="mb-3">
                    <label for="dob" >Dateofbrith :</label>
                    <input type="date" class="form-control" id="dob" required>
                </div>
                <div class="mb-3">
                    
                    <label for="position" class="form-label">position :</label>

                     <div class="input-group">
                        <span class="input-group-text">
                           <i class="bi bi-exposure"></i>
                        </span>
                        <select id="position" class="form-select" >
                        <option value="IT Support">IT Support</option>
                        <option value="IT Manager" >IT Manager</option>
                        <option value="Designer" >Designer</option>
                        <option value="Accting" >Accting</option>
                    </select>
                    </div>
                    
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea name="" id="description" class="form-control " placeholder="Enter your description"></textarea>
                </div> 
                
                <div class="mb-3">
                    <button type="submit" class="btn btn-primary w-25 me-3 mt-2">Submit</button>
                    <button type="reset" class="btn btn-outline-danger w-25 me-3 mt-2">clear</button>
                    <div id="result" class="mt-3"></div>
                </div>  
            </form>

        </div>
    </div>

</body>
<!-- link file javascript bootstrap.js -->
 <script src="../JS/bootstrap.js"></script>
 <!-- link javascript for bootstrap bundle js -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
